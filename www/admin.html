<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Grounded Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f6f4;
      padding: 40px 20px;
      text-align: center;
      color: #3e3a37;
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 30px;
    }

    .grid {
      display: grid;
      gap: 20px;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .number {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #5a4a42;
    }

    .label {
      opacity: 0.6;
      font-size: 14px;
    }

    .hint {
      margin-top: 28px;
      font-size: 13px;
      opacity: 0.55;
    }
  </style>
</head>
<body>

<h1>Grounded Analytics</h1>

<div class="grid">
  <div class="card">
    <div class="number" id="opens">0</div>
    <div class="label">App Opens</div>
  </div>

  <div class="card">
    <div class="number" id="started">0</div>
    <div class="label">Moments Started</div>
  </div>

  <div class="card">
    <div class="number" id="completed">0</div>
    <div class="label">Moments Completed</div>
  </div>
</div>

<p class="hint">Data from <code>/api/events</code> · zeros until events are tracked</p>

<script>
(function () {
  function countBy(rows, names) {
    return rows.filter(function (e) {
      var t = e && (e.event != null ? e.event : e.type);
      for (var i = 0; i < names.length; i++) {
        if (t === names[i]) return true;
      }
      return false;
    }).length;
  }

  async function loadAnalytics() {
    try {
      var url = new URL('/api/events', window.location.origin).href;
      var res = await fetch(url, { credentials: 'same-origin' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var rows = Array.isArray(data) ? data : [];

      var opens = countBy(rows, ['app_opened', 'app_open']);
      var started = countBy(rows, ['moment_started', 'moment_start']);
      var completed = countBy(rows, ['moment_completed', 'moment_complete']);

      document.getElementById('opens').innerText = String(opens);
      document.getElementById('started').innerText = String(started);
      document.getElementById('completed').innerText = String(completed);
    } catch (err) {
      console.error('Analytics error:', err);
    }
  }

  loadAnalytics();
})();
</script>

</body>
</html>
