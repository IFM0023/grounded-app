workflows:
  ios-app-store:
    name: Capacitor iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Grounded

    environment:
      ios_signing:
        certificates:
          - grounded_appstore_cert
        provisioning_profiles:
          - Grounded App Store
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      xcode: latest

    scripts:
      - npm ci
      - npm run build
      - npx cap sync ios
      - cd ios/App && pod install
      - xcode-project use-profiles
      - xcode-project build-ipa \
          --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
          --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true 
